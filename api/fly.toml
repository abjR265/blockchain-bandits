app = "blockchain-bandits-api"
primary_region = "ewr"

[build]
dockerfile = "Dockerfile"

[env]
API_PORT = "8000"
API_CORS_ORIGINS = "https://blockchain-bandits.vercel.app,http://localhost:3000"
ENVIRONMENT = "production"
MODEL_PATH = "checkpoints/xgb.json"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

  [http_service.concurrency]
  type = "requests"
  hard_limit = 50
  soft_limit = 25

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"
