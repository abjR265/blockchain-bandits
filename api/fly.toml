# fly.toml app configuration file generated for blockchain-bandits-api on 2026-04-19T10:47:13-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blockchain-bandits-api'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  API_CORS_ORIGINS = 'https://blockchain-bandits.vercel.app,http://localhost:3000'
  API_PORT = '8000'
  ENVIRONMENT = 'production'
  MODEL_PATH = 'checkpoints/xgb.json'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
